name: Email Resume Scheduler

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome and ChromeDriver
        run: |
          pip install webdriver-manager

      - name: Run scheduler
        env:
          PYTHONPATH:                ${{ github.workspace }}/src
          INBOX_EMAIL:               ${{ secrets.INBOX_EMAIL }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE:            ${{ secrets.SUPABASE_RESUME_TABLE }}
          AZURE_TENANT_ID:           ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:           ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:       ${{ secrets.AZURE_CLIENT_SECRET }}
          SAP_COMPANY_ID:            ${{ secrets.SAP_COMPANY_ID }}
          SAP_AGENCY_ID:             ${{ secrets.SAP_AGENCY_ID }}
          SAP_EMAIL:                 ${{ secrets.SAP_EMAIL }}
          SAP_PASSWORD:              ${{ secrets.SAP_PASSWORD }}
          EMAIL_CC:                  ${{ secrets.EMAIL_CC }}
          SCHEDULER_SUBMIT_TO_SAP:   'false'
          SCHEDULER_USER_EMAIL:      ${{ secrets.INBOX_EMAIL }}
          SCHEDULER_MAX_MESSAGES:    '50'
        run: python scheduler.py